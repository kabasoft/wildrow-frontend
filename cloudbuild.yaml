## Wildrow frontend — Cloud Build pipeline (Cloud Run target)
#
# Same two-trigger pattern as wildrow-backend/cloudbuild.yaml:
#   "wildrow-frontend-staging" -> push to `develop` -> _ENVIRONMENT=staging
#   "wildrow-frontend-prod"    -> push to `main`    -> _ENVIRONMENT=production
#
# Required substitutions:
#   _REGION, _AR_REPO, _SERVICE_NAME, _ENVIRONMENT, _API_BASE_URL,
#   _MIN_INSTANCES, _MAX_INSTANCES

substitutions:
  _REGION: africa-south1
  _AR_REPO: wildrow-images
  _SERVICE_NAME: wildrow-frontend-staging
  _ENVIRONMENT: staging
  _API_BASE_URL: https://api-staging.wildrow.co.zm/api
  _MIN_INSTANCES: "0"
  _MAX_INSTANCES: "10"

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: install
    name: node:20-alpine
    entrypoint: npm
    args: ["ci"]

  - id: lint
    name: node:20-alpine
    entrypoint: npm
    args: ["run", "lint"]
    waitFor: ["install"]

  # The SPA bundle bakes in the API base URL at build time, so the staging
  # and production images are NOT identical artifacts the way the backend's
  # are — each environment gets its own build.
  - id: docker-build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - "--build-arg"
      - "VITE_API_BASE_URL=${_API_BASE_URL}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:${_ENVIRONMENT}-latest"
      - "."
    waitFor: ["lint"]

  - id: docker-push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend"
    waitFor: ["docker-build"]

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--min-instances=${_MIN_INSTANCES}"
      - "--max-instances=${_MAX_INSTANCES}"
      - "--cpu=1"
      - "--memory=256Mi"
      - "--allow-unauthenticated" # public static SPA — auth happens against the backend API
      - "--quiet"
    waitFor: ["docker-push"]

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:${SHORT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/frontend:${_ENVIRONMENT}-latest"

timeout: 900s
